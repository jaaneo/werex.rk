<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
	<defs>
		<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#020617" />
			<stop offset="100%" stop-color="#0f172a" />
		</linearGradient>
		<radialGradient id="glow" cx="50%" cy="50%" r="50%">
			<stop offset="0%" stop-color="#fb923c" stop-opacity="0.55" />
			<stop offset="100%" stop-color="#fb923c" stop-opacity="0" />
		</radialGradient>
		<linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#34d399" stop-opacity="0.25" />
			<stop offset="100%" stop-color="#34d399" stop-opacity="0" />
		</linearGradient>
	</defs>

	<rect width="1200" height="630" fill="url(#sky)" />

	<!-- stars -->
	<g fill="#94a3b8">
		<circle cx="90" cy="70" r="2" />
		<circle cx="180" cy="130" r="1.5" />
		<circle cx="260" cy="60" r="1.5" />
		<circle cx="340" cy="110" r="2" />
		<circle cx="420" cy="50" r="1.5" />
		<circle cx="520" cy="90" r="1.5" />
		<circle cx="620" cy="40" r="2" />
		<circle cx="760" cy="70" r="1.5" />
		<circle cx="980" cy="60" r="2" />
		<circle cx="1080" cy="120" r="1.5" />
		<circle cx="1140" cy="80" r="1.5" />
		<circle cx="60" cy="180" r="1.5" />
	</g>

	<!-- ground -->
	<rect x="0" y="520" width="1200" height="110" fill="#0b1222" />
	<line x1="0" y1="520" x2="1200" y2="520" stroke="#1e293b" stroke-width="2" />

	<!-- grill glow -->
	<circle cx="300" cy="470" r="170" fill="url(#glow)" />

	<!-- smoke -->
	<g fill="#cbd5e1" opacity="0.18">
		<circle cx="270" cy="330" r="26" />
		<circle cx="300" cy="290" r="34" />
		<circle cx="250" cy="250" r="30" />
		<circle cx="295" cy="200" r="26" />
	</g>

	<!-- code-shaped wisp -->
	<text x="245" y="150" font-family="monospace" font-size="34" fill="#34d399" opacity="0.55">&lt;/&gt;</text>

	<!-- grill stand -->
	<g stroke="#334155" stroke-width="8" stroke-linecap="round">
		<line x1="190" y1="560" x2="230" y2="470" />
		<line x1="410" y1="560" x2="370" y2="470" />
	</g>

	<!-- grill body -->
	<rect x="170" y="440" width="260" height="40" rx="10" fill="#1e293b" stroke="#334155" stroke-width="4" />

	<!-- coals -->
	<g>
		<ellipse cx="220" cy="462" rx="16" ry="8" fill="#f97316" />
		<ellipse cx="255" cy="466" rx="14" ry="7" fill="#fbbf24" />
		<ellipse cx="290" cy="461" rx="15" ry="8" fill="#ef4444" />
		<ellipse cx="325" cy="465" rx="13" ry="7" fill="#f97316" />
		<ellipse cx="360" cy="462" rx="14" ry="7" fill="#fbbf24" />
	</g>

	<!-- grate lines -->
	<g stroke="#475569" stroke-width="3">
		<line x1="180" y1="448" x2="420" y2="448" />
		<line x1="190" y1="440" x2="190" y2="456" />
		<line x1="230" y1="440" x2="230" y2="456" />
		<line x1="270" y1="440" x2="270" y2="456" />
		<line x1="310" y1="440" x2="310" y2="456" />
		<line x1="350" y1="440" x2="350" y2="456" />
		<line x1="390" y1="440" x2="390" y2="456" />
	</g>

	<!-- two friends, simple silhouettes -->
	<g fill="#1e293b" stroke="#334155" stroke-width="3">
		<ellipse cx="560" cy="430" rx="34" ry="40" />
		<circle cx="560" cy="368" r="22" />
		<ellipse cx="700" cy="430" rx="34" ry="40" />
		<circle cx="700" cy="368" r="22" />
	</g>

	<!-- arm holding phone -->
	<path d="M724 405 L780 360" stroke="#1e293b" stroke-width="16" stroke-linecap="round" />

	<!-- phone -->
	<g>
		<rect x="770" y="270" width="120" height="220" rx="18" fill="#0f172a" stroke="#475569" stroke-width="5" />
		<rect x="782" y="290" width="96" height="178" rx="6" fill="#020617" />
		<rect x="782" y="290" width="96" height="178" rx="6" fill="url(#screenGlow)" />

		<!-- code lines on screen -->
		<g fill="#34d399">
			<rect x="792" y="305" width="38" height="6" rx="3" />
			<rect x="792" y="319" width="58" height="6" rx="3" opacity="0.7" />
		</g>
		<g fill="#94a3b8">
			<rect x="800" y="333" width="50" height="6" rx="3" />
			<rect x="800" y="347" width="40" height="6" rx="3" />
		</g>
		<g fill="#34d399">
			<rect x="792" y="361" width="64" height="6" rx="3" opacity="0.7" />
			<rect x="800" y="375" width="46" height="6" rx="3" />
		</g>
		<g fill="#94a3b8">
			<rect x="800" y="389" width="36" height="6" rx="3" />
		</g>
		<rect x="792" y="403" width="8" height="12" fill="#34d399">
			<animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
		</rect>

		<circle cx="830" cy="478" r="5" fill="#475569" />
	</g>

	<!-- spark / AI assist icon above phone -->
	<g fill="#34d399">
		<path d="M905 245 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" />
	</g>
</svg>
